name: "Gigs Competitor → Apps Script Webhook"

on:
  schedule:
    # 매주 월요일 09:00 KST (= UTC 00:00)
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      skip_wishket:
        description: "위시켓 크롤링 건너뛰기"
        type: boolean
        default: false
      skip_elancer:
        description: "이랜서 크롤링 건너뛰기"
        type: boolean
        default: false
      skip_kmong:
        description: "크몽 크롤링 건너뛰기"
        type: boolean
        default: false

concurrency:
  group: gigs-competitor-crawl
  cancel-in-progress: false

env:
  OUT_DIR: out
  PYTHON_VERSION: "3.11"

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Create output directory
        run: mkdir -p ${{ env.OUT_DIR }}/debug

      # ── 크롤러 실행 ───────────────────────────────────
      - name: "Crawl: 이랜서 (API)"
        if: ${{ github.event.inputs.skip_elancer != 'true' }}
        continue-on-error: true
        run: python crawlers/elancer_crawler.py
        env:
          OUT_DIR: ${{ env.OUT_DIR }}

      - name: "Crawl: 위시켓 (Playwright)"
        if: ${{ github.event.inputs.skip_wishket != 'true' }}
        continue-on-error: true
        run: python crawlers/wishket_crawler.py
        env:
          OUT_DIR: ${{ env.OUT_DIR }}

      - name: "Crawl: 크몽 (Playwright)"
        if: ${{ github.event.inputs.skip_kmong != 'true' }}
        continue-on-error: true
        run: python crawlers/kmong_crawler.py
        env:
          OUT_DIR: ${{ env.OUT_DIR }}

      - name: List collected CSVs
        run: |
          echo "=== Collected CSV files ==="
          ls -la ${{ env.OUT_DIR }}/*.csv 2>/dev/null || echo "No CSV files found"
          for f in ${{ env.OUT_DIR }}/*.csv; do
            if [ -f "$f" ]; then
              echo "--- $f ---"
              wc -l "$f"
            fi
          done

      # ── Apps Script 웹훅으로 전송 ────────────────────
      - name: "Pipeline: CSV → Apps Script Webhook"
        run: python pipeline/webhook_pipeline.py
        env:
          OUT_DIR: ${{ env.OUT_DIR }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          SHARED_SECRET: ${{ secrets.SHARED_SECRET }}

      - name: Upload CSV + debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gigs-artifacts
          path: |
            ${{ env.OUT_DIR }}/*.csv
            ${{ env.OUT_DIR }}/debug/
          retention-days: 30
